services:
  database:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: database
    ports:
      - "5432:5432"
    healthcheck:
      test: [CMD-SHELL, pg_isready -U user -d database]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s

  importer:
    build:
      context: ./database
      dockerfile: Dockerfile.importer
    environment:
      SQLITE_FILE: /data/Chinook.db
      DATABASE_URL: postgres://user:password@database:5432/database
    volumes:
      - ./database/Chinook.db:/data/Chinook.db:ro
    restart: on-failure
    depends_on:
      database:
        condition: service_healthy

  mcp-gateway:
    image: docker/mcp-gateway:latest
    use_api_socket: true
    command:
      - --transport=sse
      - --allow-unauthenticated
      - --config=/mcp-config.yaml
      - --servers=database-server
      - --tools=execute_sql,list_tables,describe_table
    volumes:
      - ./mcp-config.yaml:/mcp-config.yaml:ro
    depends_on:
      importer:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider --quiet http://localhost:8811/sse || exit 1"
        ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  application:
    build:
      context: ./application
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "http://localhost:8080/actuator/health/readiness"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    depends_on:
      importer:
        condition: service_completed_successfully
      mcp-gateway:
        condition: service_healthy

  console:
    build:
      context: ./console
    ports:
      - "4200:4200"
    depends_on:
      application:
        condition: service_healthy