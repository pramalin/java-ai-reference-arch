services:
  app:
    build:
      target: app
    ports:
      - 8080:8080
    environment:
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB_CLIENT=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_AI_OPENAI=DEBUG
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_AI_MODEL_TOOL=TRACE
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_AI_CHAT=TRACE
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - MCP_GATEWAY_URL=http://mcp-gateway:8811
      #- QUESTION="Does Spring AI supports the Model Context Protocol? Please provide some references."
      - QUESTION="You must use the available search tool before answering. Search for the current Spring AI MCP documentation. Do not answer from memory."
    depends_on:
      - mcp-gateway

  mcp-gateway:
    # mcp-gateway secures your MCP servers
    image: docker/mcp-gateway:latest
    use_api_socket: true
    ports:
      - 8811:8811
    command:
      - --transport=sse
      - --allow-unauthenticated
      # add any MCP servers you want to use
      - --servers=duckduckgo
      - --tools=search,fetch_content
